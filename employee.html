<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow — Employee Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Victorian Gothic Theme ── */
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&family=DM+Mono:wght@400;500&display=swap');

:root {
  --gold:        #c9a84c;
  --gold-light:  #e8c96a;
  --gold-dark:   #8a6c28;
  --gold-dim:    rgba(201,168,76,0.2);
  --gold-border: rgba(201,168,76,0.4);
  --crimson:     #8b0000;
  --surface:     rgba(10,0,0,0.82);
  --surface2:    rgba(20,0,0,0.88);
  --surface3:    rgba(5,0,0,0.92);
  --border:      rgba(201,168,76,0.25);
  --border2:     rgba(201,168,76,0.15);
  --text:        #f0e6cc;
  --text-dim:    #9a8a6a;
  --text-muted:  #6a5a3a;
  --green:       #4a9a6a;
  --green-dim:   rgba(74,154,106,0.15);
  --red-alert:   #cc2200;
  --amber:       #c87020;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IM Fell English', Georgia, serif;
  color: var(--text);
  min-height: 100vh;
  background:
    url('damask.png') repeat,
    linear-gradient(to bottom, #cc0000 0%, #7a0000 45%, #3a0000 100%);
  background-size: 380px auto, cover;
  background-attachment: scroll, fixed;
}

/* ── Header ── */
.kb-header {
  background: var(--surface3);
  border-bottom: 1px solid var(--gold-border);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 20px rgba(0,0,0,0.6);
}
.kb-header::after {
  content: '';
  position: absolute; bottom: -3px; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
}
.kb-logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 16px; font-weight: 700;
  letter-spacing: 0.08em; color: var(--gold);
  text-shadow: 0 0 20px rgba(201,168,76,0.4);
}
.kb-logo span { color: var(--gold-light); }
.kb-header-right { display: flex; gap: 12px; align-items: center; }
.live-time { font-family: 'DM Mono', monospace; font-size: 13px; color: #ffe033; letter-spacing: 0.06em; display: flex; align-items: center; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; vertical-align: middle; transition: background 0.3s; flex-shrink: 0; }
.sync-dot.offline { background: var(--red-alert); }

.btn {
  font-family: 'Cinzel', serif;
  font-size: 11px; font-weight: 600;
  padding: 7px 16px; border: none; cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.08em; text-transform: uppercase;
}
.btn-ghost {
  background: transparent; color: var(--gold);
  border: 1px solid var(--gold-border);
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
.btn-ghost:hover { background: var(--gold-dim); color: var(--gold-light); }
.btn-primary {
  background: linear-gradient(135deg, #8a6c28, #c9a84c, #8a6c28);
  color: #1a0a00; font-weight: 700;
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.btn-primary:hover { background: linear-gradient(135deg, #c9a84c, #e8c96a, #c9a84c); }

/* ── Summary bar ── */
.summary-bar {
  display: flex; padding: 0 20px;
  background: var(--surface3);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.summary-stat { padding: 10px 20px; border-right: 1px solid var(--border2); display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
.summary-stat:first-child { padding-left: 0; }
.stat-label { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold-dark); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; }
.stat-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--text); }
.stat-val.purple { color: #ffe033; }
.stat-val.green  { color: #ff4411; }
.stat-val.amber  { color: #ffaa00; }

/* ── Board ── */
.kb-board { display: flex; gap: 16px; padding: 20px; overflow-x: auto; min-height: calc(100vh - 104px); align-items: flex-start; }

/* ── Column ── */
.kb-column {
  flex: 0 0 300px;
  background: var(--surface);
  border: 1px solid var(--gold-border);
  border-radius: 0;
  display: flex; flex-direction: column;
  max-height: calc(100vh - 120px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(201,168,76,0.08);
  clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
}
.col-header {
  padding: 16px 14px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  background: linear-gradient(180deg, rgba(80,20,0,0.6) 0%, transparent 100%);
}
.col-name { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600; color: var(--gold); letter-spacing: 0.05em; line-height: 1.3; }
.col-role { font-family: 'IM Fell English', serif; font-style: italic; font-size: 12px; color: var(--text-dim); margin-top: 3px; }
.col-count { font-size: 11px; font-weight: 600; background: var(--gold-dim); color: var(--gold); border-radius: 0; padding: 2px 8px; font-family: 'DM Mono', monospace; border: 1px solid var(--gold-border); }
.col-hours { font-size: 11px; font-family: 'DM Mono', monospace; background: var(--green-dim); color: var(--green); border-radius: 0; padding: 2px 8px; border: 1px solid rgba(74,154,106,0.3); }
.emp-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-size: 12px; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; flex-shrink: 0; padding: 0; }
.emp-btn:hover { background: var(--gold-dim); color: var(--gold); border-color: var(--gold-border); }
.emp-btn.emp-del:hover { background: rgba(180,20,0,0.2); color: #e87d5a; border-color: rgba(180,20,0,0.4); }

/* ── Attendance / Payroll bar ── */
.attendance-bar {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: rgba(80,10,0,0.5);
  flex-shrink: 0;
}
.attendance-bar-inner { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.attendance-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold-dark); font-weight: 600; flex-shrink: 0; }
.attendance-timer {
  font-family: 'DM Mono', monospace; font-size: 13px;
  color: var(--text-muted); letter-spacing: 0.04em; transition: color 0.3s;
}
.attendance-timer.att-running { color: #ffe033; }
.att-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(80,60,20,0.6); flex-shrink: 0; transition: background 0.3s; }
.att-dot.att-running { background: var(--green); animation: blink 1.4s ease-in-out infinite; }
.btn-att-in {
  font-family: 'Cinzel', serif; font-size: 10px; font-weight: 600;
  padding: 5px 10px; cursor: pointer;
  background: var(--gold-dim); color: var(--gold);
  border: 1px solid var(--gold-border);
  letter-spacing: 0.06em; transition: all 0.12s; white-space: nowrap;
  text-transform: uppercase;
}
.btn-att-in:hover { background: rgba(201,168,76,0.3); color: var(--gold-light); }
.btn-att-out {
  font-family: 'Cinzel', serif; font-size: 10px; font-weight: 600;
  padding: 5px 10px; cursor: pointer;
  background: var(--green-dim); color: var(--green);
  border: 1px solid rgba(74,154,106,0.4);
  letter-spacing: 0.06em; transition: all 0.12s; white-space: nowrap;
  text-transform: uppercase;
}
.btn-att-out:hover { background: rgba(74,154,106,0.22); }
.btn-att-out.att-blocked { background: rgba(180,20,0,0.1); color: #e87d5a; border-color: rgba(180,20,0,0.35); cursor: not-allowed; }

/* ── Column body ── */
.col-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; }
.col-body::-webkit-scrollbar { width: 4px; }
.col-body::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 0; }
.empty-col { text-align: center; color: var(--text-muted); font-style: italic; font-size: 12px; padding: 20px 10px; }

/* ── Job cards ── */
.task-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 0;
  padding: 14px;
  transition: border-color 0.15s, transform 0.15s;
  position: relative;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}
.task-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(201,168,76,0.05) 0%, transparent 50%);
  pointer-events: none;
}
.task-card:hover { border-color: var(--gold-border); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.task-card.clocked-in { border-color: rgba(74,154,106,0.5); background: rgba(0,20,5,0.88); }
.task-card.halfway { border-color: var(--amber); animation: halfwayPulse 2s ease-in-out infinite; }
.task-card.halfway:hover { border-color: #e8a040; }
.task-card.over-budget { border-color: #ff2d2d; background: rgba(30,0,0,0.92); animation: overBudgetPulse 1.6s ease-in-out infinite; }
.task-card.over-budget:hover { border-color: #ff5555; }

@keyframes blink { 0%,100%{opacity:1;box-shadow:0 0 5px var(--green)}50%{opacity:.3;box-shadow:none} }
@keyframes halfwayPulse { 0%,100%{border-color:var(--amber);box-shadow:0 0 0 0 rgba(200,112,32,0)}50%{border-color:#e8a040;box-shadow:0 0 10px 3px rgba(200,112,32,.3)} }
@keyframes overBudgetPulse { 0%,100%{border-color:#ff2d2d;box-shadow:0 0 0 0 rgba(255,45,45,0)}50%{border-color:#ff6060;box-shadow:0 0 10px 3px rgba(255,45,45,.35)} }

.card-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.card-title { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; color: var(--gold-light); line-height: 1.4; flex: 1; letter-spacing: 0.03em; }
.priority-pill { font-family: 'Cinzel', serif; font-size: 9px; font-weight: 600; padding: 3px 8px; border-radius: 0; flex-shrink: 0; letter-spacing: 0.06em; text-transform: uppercase; }
.pill-high   { background: rgba(180,40,0,0.25); color: #e87d5a; border: 1px solid rgba(180,40,0,0.4); }
.pill-medium { background: rgba(180,100,0,0.2); color: var(--amber); border: 1px solid rgba(180,100,0,0.35); }
.pill-low    { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,154,106,0.3); }
.card-bullets { list-style: none; padding: 0; margin: 0 0 12px; display: flex; flex-direction: column; gap: 5px; }
.card-bullets li { font-family: 'IM Fell English', serif; font-size: 12px; color: var(--text-dim); line-height: 1.4; padding-left: 16px; position: relative; }
.card-bullets li::before { content: '❧'; position: absolute; left: 0; top: 0; font-size: 10px; color: var(--gold-dark); }

/* ── Timer section — Nixie Tube Style ── */
.card-timer-section {
  background: #0a0400;
  border-radius: 0;
  padding: 10px 12px; margin-bottom: 12px;
  border: 1px solid rgba(180,80,0,0.3);
  border-left: 2px solid rgba(180,80,0,0.5);
  box-shadow: inset 0 0 12px rgba(0,0,0,0.8);
}
.timer-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }

.timer-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.timer-display {
  font-family: 'DM Mono', monospace;
  font-size: 26px; font-weight: 500;
  color: #3a2000;
  letter-spacing: 0.05em;
  transition: color 0.3s;
}
.timer-display.running {
  color: #ffe033;
  text-shadow: 0 0 8px rgba(255,220,50,0.4);
}
.pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(80,40,0,0.5); transition: background 0.3s; flex-shrink: 0; }
.pulse-dot.running { background: #ff4411; box-shadow: 0 0 6px rgba(255,60,0,0.6); animation: pulseDot 1.4s ease-in-out infinite; }
@keyframes pulseDot { 0%,100%{opacity:1;box-shadow:0 0 6px rgba(255,60,0,0.6)}50%{opacity:.3;box-shadow:none} }

.timer-meta { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; min-height: 14px; font-style: italic; }
.timer-meta.running { color: #ffaa00; }

/* ── Card footer ── */
.card-footer {
  border-top: 1px solid var(--border2);
  padding-top: 11px; display: flex; flex-direction: column; gap: 6px;
}
.card-meta-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); }
.meta-label { color: var(--text-muted); font-style: italic; }
.meta-val { color: var(--text-dim); font-weight: 500; }
.card-actions { display: flex; gap: 6px; margin-top: 4px; }
.card-btn {
  flex: 1; background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-muted); font-size: 11px; padding: 6px 0;
  cursor: pointer; font-family: 'Cinzel', serif;
  font-weight: 600; transition: all 0.1s; text-align: center;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.card-btn:hover { background: var(--gold-dim); color: var(--gold); border-color: var(--gold-border); }
.card-btn.del:hover { background: rgba(180,20,0,0.2); color: #e87d5a; border-color: rgba(180,20,0,0.4); }

.btn-punch-in {
  flex: 2; background: var(--gold-dim);
  border: 1px solid var(--gold-border);
  color: var(--gold); font-size: 11px; font-weight: 700;
  padding: 7px 0; cursor: pointer;
  font-family: 'Cinzel', serif;
  transition: all 0.1s; text-align: center;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.btn-punch-in:hover { background: rgba(201,168,76,0.3); color: var(--gold-light); }
.btn-punch-out {
  flex: 2; background: var(--green-dim);
  border: 1px solid rgba(74,154,106,0.45);
  color: var(--green); font-size: 11px; font-weight: 700;
  padding: 7px 0; cursor: pointer;
  font-family: 'Cinzel', serif;
  transition: all 0.1s; text-align: center;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.btn-punch-out:hover { background: rgba(74,154,106,0.22); }

/* ── Add buttons ── */
.col-add-btn {
  margin: 0 12px 12px;
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--text-muted); font-size: 11px;
  font-family: 'Cinzel', serif; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 8px; cursor: pointer;
  width: calc(100% - 24px); transition: all 0.15s; flex-shrink: 0;
}
.col-add-btn:hover { border-color: var(--gold-border); color: var(--gold); background: var(--gold-dim); }
.add-col-btn {
  flex: 0 0 56px;
  background: rgba(10,0,0,0.6);
  border: 1px dashed var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 24px; color: var(--text-muted);
  transition: all 0.15s; min-height: 120px;
}
.add-col-btn:hover { border-color: var(--gold-border); color: var(--gold); background: var(--gold-dim); }

/* ── Modals ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.82); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal {
  background: var(--surface3);
  border: 1px solid var(--gold-border);
  border-radius: 0; padding: 28px;
  width: 420px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(201,168,76,0.06);
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
}
.modal.modal-wide { width: 620px; }
.modal h3 {
  font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700;
  color: var(--gold); margin-bottom: 20px;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.form-group { margin-bottom: 14px; }
.form-label {
  font-family: 'Cinzel', serif; font-size: 10px;
  color: var(--text-muted); margin-bottom: 6px; display: block;
  font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
}
.form-input, .form-textarea, .form-select {
  font-family: 'IM Fell English', serif; font-size: 13px;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--border);
  border-radius: 0; color: var(--text);
  padding: 8px 12px; width: 100%; outline: none;
  transition: border-color 0.15s;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--gold); }
.form-select option { background: #1a0000; }

/* ── Project picker ── */
.project-picker-box {
  font-family: 'IM Fell English', serif; font-size: 13px;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; width: 100%;
  cursor: pointer; transition: border-color 0.15s;
  display: flex; align-items: center; justify-content: space-between;
}
.project-picker-box:hover { border-color: var(--gold); }
.project-picker-box .ppb-placeholder { color: var(--text-muted); font-style: italic; }
.project-picker-box .ppb-arrow { color: var(--gold-dark); font-size: 11px; }

.project-list {
  max-height: 240px; overflow-y: auto;
  border: 1px solid var(--border); margin-bottom: 12px;
  background: rgba(0,0,0,0.4);
}
.project-list::-webkit-scrollbar { width: 4px; }
.project-list::-webkit-scrollbar-thumb { background: var(--gold-dark); }
.project-item {
  font-family: 'IM Fell English', serif; font-size: 13px;
  padding: 9px 14px; cursor: pointer;
  border-bottom: 1px solid var(--border2);
  color: var(--text-dim);
  transition: all 0.12s;
}
.project-item:last-child { border-bottom: none; }
.project-item:hover { background: var(--gold-dim); color: var(--gold-light); }
.project-item.selected { background: var(--gold-dim); color: var(--gold); font-weight: 600; }
.project-empty { padding: 20px; text-align: center; color: var(--text-muted); font-style: italic; font-size: 12px; }
.add-project-row { display: flex; gap: 8px; }
.add-project-row .form-input { flex: 1; }
.add-project-row .btn { flex-shrink: 0; padding: 8px 14px; }
.form-textarea { resize: vertical; min-height: 80px; }
.form-textarea.error { border-color: var(--red-alert); }
.bullets-helper { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-style: italic; }
.notes-required-hint { font-size: 11px; color: var(--amber); margin-top: 4px; display: none; font-style: italic; }
.notes-required-hint.visible { display: block; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

/* ── Loading overlay ── */
.loading-overlay {
  position: fixed; inset: 0;
  background: #1a0000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; gap: 16px;
}
.loading-spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: 'Cinzel', serif; font-size: 12px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Connecting to database…</div>
</div>

<div class="kb-header">
  <div class="kb-logo">Foster<span> Vintage</span> <span style="color:var(--text-muted);font-family:'IM Fell English',serif;font-style:italic;font-size:12px;font-weight:400;margin-left:8px;letter-spacing:0.02em;">— Employee Board</span></div>
  <div class="kb-header-right">
    <div class="live-time"><span class="sync-dot" id="syncDot"></span><span id="liveClock">--:--:--</span></div>
    <button class="btn btn-ghost" onclick="openAddEmployee()">+ Employee</button>
    <button class="btn btn-primary" onclick="openAddJob(null)">+ Job</button>
  </div>
</div>

<div class="summary-bar">
  <div class="summary-stat"><span class="stat-label">Today's Hours</span><span class="stat-val purple" id="statToday">0.00h</span></div>
  <div class="summary-stat"><span class="stat-label">This Week</span><span class="stat-val" id="statWeek">0.00h</span></div>
  <div class="summary-stat"><span class="stat-label">Active Sessions</span><span class="stat-val green" id="statActive">0</span></div>
  <div class="summary-stat"><span class="stat-label">Clocked In</span><span class="stat-val amber" id="statAttActive">0</span></div>
  <div class="summary-stat"><span class="stat-label">Employees</span><span class="stat-val" id="statEmps">0</span></div>
</div>

<div class="kb-board" id="board"></div>
<div id="modalContainer"></div>

<script type="module">
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, doc,
         onSnapshot, setDoc, updateDoc,
         deleteDoc, addDoc, query,
         orderBy, serverTimestamp }               from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

// ── Firebase config ───────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyBNorf5AU_cS-0N_M2C5DMgRHesrd6Yh5s",
  authDomain:        "employee-timeclock-fca3a.firebaseapp.com",
  projectId:         "employee-timeclock-fca3a",
  storageBucket:     "employee-timeclock-fca3a.firebasestorage.app",
  messagingSenderId: "1008260914486",
  appId:             "1:1008260914486:web:92e113e41a88cccd822797"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Collections ───────────────────────────────────────────────────────
const empCol     = collection(db, 'employees');
const jobCol     = collection(db, 'jobs');
const logCol     = collection(db, 'jobLog');
const attCol     = collection(db, 'attendanceLog');
const projectCol = collection(db, 'projects');

// ── In-memory state (populated by Firestore listeners) ────────────────
let employees     = [];
let jobs          = [];
let logEntries    = [];
let attendanceLog = [];
let projects      = []; // { id, name }

// Active timers live only in memory (per-device, intentional)
// attendanceTimers track who is currently clocked in on THIS device
// We store attendance clock-in time in Firestore so other devices can see it
let activeTimers     = {}; // { jobId: { start, empId } } — mirrors 'activeJobs' collection
let attendanceTimers = {}; // { empId: { start } } — mirrors 'activeAttendance' collection

const activeAttCol = collection(db, 'activeAttendance');
const activeJobCol = collection(db, 'activeJobs');

let currentEditJob = null, currentEditEmployee = null, pendingEmpId = null;
let dbReady = 0; // count of listeners that have fired at least once

function checkReady() {
  dbReady++;
  if (dbReady >= 5) {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('syncDot').classList.remove('offline');
    renderBoard();
    renderStats();
  }
}

// ── Firestore listeners (real-time) ───────────────────────────────────
onSnapshot(empCol, snap => {
  employees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  employees.sort((a,b) => (a.name||'').localeCompare(b.name||''));
  checkReady(); renderBoard(); renderStats();
});

onSnapshot(query(jobCol), snap => {
  jobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  checkReady(); renderBoard(); renderStats();
});

onSnapshot(query(logCol, orderBy('start','desc')), snap => {
  logEntries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  checkReady(); renderBoard(); renderStats();
});

onSnapshot(query(attCol, orderBy('start','desc')), snap => {
  attendanceLog = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  checkReady(); renderBoard(); renderStats();
});

onSnapshot(query(projectCol), snap => {
  projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  projects.sort((a,b) => (a.name||'').localeCompare(b.name||''));
  checkReady();
});

// Live attendance clock-in states (who is currently clocked in)
onSnapshot(activeAttCol, snap => {
  attendanceTimers = {};
  snap.docs.forEach(d => {
    attendanceTimers[d.id] = d.data(); // empId -> { start }
  });
  renderBoard(); renderStats();
});

onSnapshot(activeJobCol, snap => {
  activeTimers = {};
  snap.docs.forEach(d => { activeTimers[d.id] = d.data(); }); // jobId -> { start, empId }
  renderBoard(); renderStats();
});

// ── Write helpers ─────────────────────────────────────────────────────
async function saveEmployee(emp) {
  const { id, ...data } = emp;
  await setDoc(doc(db, 'employees', id), data);
}
async function saveJob(job) {
  const { id, ...data } = job;
  await setDoc(doc(db, 'jobs', id), data);
}
async function saveLogEntry(entry) {
  const { id, ...data } = entry;
  await setDoc(doc(db, 'jobLog', id), data);
}
async function saveAttEntry(entry) {
  const { id, ...data } = entry;
  await setDoc(doc(db, 'attendanceLog', id), data);
}
async function deleteEmployee(empId) {
  const emp  = employees.find(e => e.id === empId);
  const empJobs = jobs.filter(j => j.empId === empId);
  const msg  = empJobs.length > 0
    ? `Delete ${emp.name}? This will also delete their ${empJobs.length} job(s).`
    : `Delete ${emp.name}?`;
  if (!confirm(msg)) return;
  empJobs.forEach(j => { if (activeTimers[j.id]) deleteDoc(doc(db,'activeJobs',j.id)); });
  await Promise.all([
    deleteDoc(doc(db,'employees',empId)),
    ...empJobs.map(j => deleteDoc(doc(db,'jobs',j.id)))
  ]);
}
function deleteJob(jobId) {
  const job = jobs.find(j => j.id === jobId);
  const title = job ? job.title : 'this job';
  document.getElementById('modalContainer').innerHTML =
    '<div class="modal-overlay"><div class="modal">' +
    '<h3 style="color:#e87d5a;">Delete Job?</h3>' +
    '<p style="font-size:14px;color:#9494aa;line-height:1.6;margin-bottom:20px;">Are you sure you want to delete <strong style="color:#e2e2e8;">' + title + '</strong>? This cannot be undone.</p>' +
    '<div class="modal-actions">' +
    '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
    '<button class="btn" style="background:#e87d5a;color:#fff;font-weight:600;" onclick="confirmDeleteJob(\'' + jobId + '\')">Yes, Delete</button>' +
    '</div></div></div>';
}
async function confirmDeleteJob(jobId) {
  if (activeTimers[jobId]) await deleteDoc(doc(db,'activeJobs',jobId));
  closeModal();
  await deleteDoc(doc(db,'jobs',jobId));
}
async function deleteLogEntry(id) { await deleteDoc(doc(db,'jobLog',id)); }
async function deleteAttEntry(id) { await deleteDoc(doc(db,'attendanceLog',id)); }

// Expose to global for onclick handlers
window.deleteEmployee  = deleteEmployee;
window.deleteJob       = deleteJob;
window.confirmDeleteJob= confirmDeleteJob;
window.deleteLogEntry  = deleteLogEntry;

// ── Time helpers ──────────────────────────────────────────────────────
// ── Nixie tube renderer ───────────────────────────────────────────────
// Ghost digit pairs — each tube shows a faint "other" digit underneath
const GHOST = ['9','8','7','6','5','4','3','2','1','0'];
function nixie(timeStr, isLit) {
  // timeStr = "HH:MM:SS"
  let digitIdx = 0;
  return timeStr.split('').map(ch => {
    if (ch === ':') {
      return `<span class="nixie-sep${isLit?' lit':''}"><span class="nixie-sep-dot"></span><span class="nixie-sep-dot"></span></span>`;
    }
    const ghost = GHOST[(parseInt(ch) + 3 + digitIdx) % 10];
    digitIdx++;
    return `<span class="nixie-tube${isLit?' lit':''}" data-ghost="${ghost}">${ch}</span>`;
  }).join('');
}

function formatDur(ms) {
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}
function durHours(ms) { return (ms/3600000).toFixed(2); }
function fmtTime(ts)  { return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(ts)  { return new Date(ts).toLocaleDateString([],{month:'short',day:'numeric'}); }
function fmtDateTime(ts) { return `${fmtDate(ts)} ${fmtTime(ts)}`; }
function isToday(ts)  { const d=new Date(ts),n=new Date(); return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate(); }
function getWeekStart() {
  const now=new Date(), d=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  d.setDate(d.getDate()-d.getDay()); return d.getTime();
}
function isThisWeek(ts) { return ts >= getWeekStart(); }

// ── Attendance ────────────────────────────────────────────────────────
window.attendanceIn = async function(empId) {
  if (attendanceTimers[empId]) return;
  await setDoc(doc(db,'activeAttendance',empId), { start: Date.now() });
};

window.attendanceOut = async function(empId) {
  if (!attendanceTimers[empId]) return;
  const empJobs   = jobs.filter(j => j.empId === empId);
  const runningJob = empJobs.find(j => activeTimers[j.id]);
  if (runningJob) {
    document.getElementById('modalContainer').innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal"><h3 style="color:#f87171;">Cannot Clock Out</h3>
          <p style="font-size:14px;color:#9494aa;line-height:1.6;margin-bottom:20px;">
            You must clock out of <strong style="color:#e2e2e8;">${runningJob.title}</strong> before clocking out for attendance.</p>
          <div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">OK, go back</button></div>
        </div></div>`;
    return;
  }
  const start = attendanceTimers[empId].start;
  const end   = Date.now();
  const emp   = employees.find(e => e.id === empId);
  const entry = { empId, empName: emp?emp.name:'—', start, end, duration: end-start };
  await Promise.all([
    saveAttEntry({ id:'a'+Date.now(), ...entry }),
    deleteDoc(doc(db,'activeAttendance',empId))
  ]);
};

// ── Job punch ─────────────────────────────────────────────────────────
window.punchIn = async function(jobId) {
  if (activeTimers[jobId]) return;
  const job = jobs.find(j => j.id === jobId);
  if (job && !attendanceTimers[job.empId]) {
    const emp = employees.find(e => e.id === job.empId);
    document.getElementById('modalContainer').innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal"><h3 style="color:#f0aa55;">Attendance Required</h3>
          <p style="font-size:14px;color:#9494aa;line-height:1.6;margin-bottom:20px;">
            <strong style="color:#e2e2e8;">${emp?emp.name:'This employee'}</strong> must clock in for attendance before starting a job.</p>
          <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="closeModal();attendanceIn('${job.empId}').then(()=>punchIn('${jobId}'))">Clock In for Attendance &amp; Job</button>
          </div></div></div>`;
    return;
  }
  await setDoc(doc(db,'activeJobs',jobId), { start: Date.now(), jobId, empId: job ? job.empId : null });
  renderBoard(); renderStats();
};

window.punchOut = function(jobId) {
  if (!activeTimers[jobId]) return;
  const job     = jobs.find(j => j.id === jobId);
  const elapsed = formatDur(Date.now() - activeTimers[jobId].start);
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay">
      <div class="modal modal-wide">
        <h3 style="display:flex;align-items:center;gap:10px;">Clock Out
          <span style="font-size:11px;font-weight:400;color:#555568;font-family:'DM Mono',monospace;">${job?job.title:''}</span></h3>
        <div style="background:#0a0400;border:1px solid rgba(180,80,0,0.3);padding:10px 14px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;">
          <span style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);">Session Time</span>
          <div id="clockOutTimer" style="font-family:'DM Mono',monospace;font-size:22px;color:#ffe033;">${elapsed}</div>
        </div>
        <div class="form-group">
          <label class="form-label">WORK NOTES <span style="color:#e87d5a;">*</span></label>
          <textarea class="form-textarea" id="punchOutNotes" rows="3" placeholder="Describe what you worked on…"></textarea>
          <div class="notes-required-hint" id="notesHint">⚠ Work notes are required before clocking out.</div>
        </div>
        <div class="form-group">
          <label class="form-label">MATERIALS USED <span style="color:#e87d5a;">*</span></label>
          <textarea class="form-textarea" id="punchOutMaterials" rows="3" placeholder="List materials used… Enter &quot;None&quot; if none."></textarea>
          <div class="notes-required-hint" id="materialsHint">⚠ Materials used are required. Enter "None" if none.</div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn" style="background:#5aba8d;color:#0f0f11;font-weight:600;" onclick="confirmPunchOut('${jobId}')">⬛ Confirm Clock Out</button>
        </div>
      </div>
    </div>`;
  const timerEl=document.getElementById('clockOutTimer');
  const tick=setInterval(()=>{if(!document.getElementById('clockOutTimer')){clearInterval(tick);return;}timerEl.textContent=formatDur(Date.now()-activeTimers[jobId].start);},1000);
};

window.confirmPunchOut = async function(jobId) {
  const notesEl=document.getElementById('punchOutNotes'), matEl=document.getElementById('punchOutMaterials');
  const notes=notesEl.value.trim(), materials=matEl.value.trim();
  let valid=true;
  if(!notes){notesEl.classList.add('error');document.getElementById('notesHint').classList.add('visible');if(valid)notesEl.focus();valid=false;}
  if(!materials){matEl.classList.add('error');document.getElementById('materialsHint').classList.add('visible');if(valid)matEl.focus();valid=false;}
  if(!valid||!activeTimers[jobId]){if(!activeTimers[jobId])closeModal();return;}
  const start=activeTimers[jobId].start, end=Date.now();
  const job=jobs.find(j=>j.id===jobId), emp=job?employees.find(e=>e.id===job.empId):null;
  const entry = { id:'l'+Date.now(), jobId, jobTitle:job?job.title:'—', empName:emp?emp.name:'—', start, end, duration:end-start, workNotes:notes, materials };
  closeModal();
  await deleteDoc(doc(db,'activeJobs',jobId));
  await saveLogEntry(entry);
  renderBoard(); renderStats();
};

window.cancelPunchOut = () => closeModal();

// ── Stats ─────────────────────────────────────────────────────────────
function renderStats() {
  let todayMs=0, weekMs=0;
  logEntries.forEach(e => {
    if(isToday(e.start))    todayMs+=e.duration;
    if(isThisWeek(e.start)) weekMs +=e.duration;
  });
  Object.entries(activeTimers).forEach(([,t]) => {
    const el=Date.now()-t.start;
    if(isToday(t.start))    todayMs+=el;
    if(isThisWeek(t.start)) weekMs +=el;
  });
  document.getElementById('statToday').textContent     = durHours(todayMs)+'h';
  document.getElementById('statWeek').textContent      = durHours(weekMs)+'h';
  document.getElementById('statActive').textContent    = Object.keys(activeTimers).length;
  document.getElementById('statAttActive').textContent = Object.keys(attendanceTimers).length;
  document.getElementById('statEmps').textContent      = employees.length;
}

// ── Weekly helpers ────────────────────────────────────────────────────
function weeklyJobHoursForEmp(empId) {
  const ws = getWeekStart();
  const empJs = jobs.filter(j => j.empId === empId);
  let ms = empJs.reduce((sum,job) => sum + logEntries.filter(e=>e.jobId===job.id&&e.start>=ws).reduce((s,e)=>s+e.duration,0), 0);
  empJs.forEach(job => { if(activeTimers[job.id]&&activeTimers[job.id].start>=ws) ms+=Date.now()-activeTimers[job.id].start; });
  return ms;
}
function weeklyAttHoursForEmp(empId) {
  const ws = getWeekStart();
  let ms = attendanceLog.filter(a=>a.empId===empId&&a.start>=ws).reduce((s,a)=>s+a.duration,0);
  if(attendanceTimers[empId]&&attendanceTimers[empId].start>=ws) ms+=Date.now()-attendanceTimers[empId].start;
  return ms;
}

// ── Board render ──────────────────────────────────────────────────────
function pillClass(p) { return{high:'pill-high',medium:'pill-medium',low:'pill-low'}[p]||'pill-low'; }
function pillLabel(p) { return{high:'Urgent',medium:'Normal',low:'Low'}[p]||p; }
function totalLoggedMs(jobId) { return logEntries.filter(e=>e.jobId===jobId).reduce((s,e)=>s+e.duration,0); }

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  employees.forEach(emp => {
    const empJobs    = jobs.filter(j=>j.empId===emp.id);
    const empLogMs   = empJobs.reduce((s,j)=>s+totalLoggedMs(j.id),0);
    const empActMs   = empJobs.reduce((s,j)=>{if(activeTimers[j.id])s+=Date.now()-activeTimers[j.id].start;return s;},0);
    const attRunning = !!attendanceTimers[emp.id];
    const weekAttMs  = weeklyAttHoursForEmp(emp.id);
    const hasRunningJob = empJobs.some(j=>activeTimers[j.id]);

    const col = document.createElement('div');
    col.className = 'kb-column';
    col.innerHTML = `
      <div class="col-header">
        <div><div class="col-name">${emp.name}</div><div class="col-role">${emp.role}</div></div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="col-count">${empJobs.length}</div>
          <div class="col-hours">${durHours(empLogMs+empActMs)}h</div>
          <button class="emp-btn" onclick="openEditEmployee('${emp.id}')" title="Edit">✎</button>
          <button class="emp-btn emp-del" onclick="deleteEmployee('${emp.id}')" title="Delete">✕</button>
        </div>
      </div>
      <div class="attendance-bar">
        <div class="attendance-bar-inner">
          <span class="attendance-label">Payroll Clock</span>
          <div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:center;">
            <div class="att-dot ${attRunning?'att-running':''}"></div>
            <span class="attendance-timer ${attRunning?'att-running':''}" id="att-timer-${emp.id}">${formatDur(weekAttMs)}</span>
          </div>
          ${attRunning
            ? `<button class="btn-att-out ${hasRunningJob?'att-blocked':''}" onclick="attendanceOut('${emp.id}')" title="${hasRunningJob?'Clock out of job first':'Clock out for the day'}">⬛ Clock Out</button>`
            : `<button class="btn-att-in" onclick="attendanceIn('${emp.id}')">▶ Clock In</button>`}
        </div>
      </div>
      <div class="col-body" id="colbody-${emp.id}"></div>
      <button class="col-add-btn" onclick="openAddJob('${emp.id}')">+ Add job</button>`;
    board.appendChild(col);

    const colBody = col.querySelector(`#colbody-${emp.id}`);
    if (!empJobs.length) { colBody.innerHTML='<div class="empty-col">No jobs assigned</div>'; return; }

    empJobs.forEach(job => {
      const isRunning  = !!activeTimers[job.id];
      const logMs      = totalLoggedMs(job.id);
      const actMs      = isRunning ? Date.now()-activeTimers[job.id].start : 0;
      const totalMs    = logMs+actMs;
      const estMs      = (job.estHours||0)*3600000;
      const isOver     = estMs>0&&totalMs>estMs;
      const isHalf     = estMs>0&&!isOver&&totalMs>=estMs*0.5;
      const sessions   = logEntries.filter(e=>e.jobId===job.id).length;
      const lastEntry  = logEntries.find(e=>e.jobId===job.id);

      const card = document.createElement('div');
      let cls='task-card';
      if(isRunning)   cls+=' clocked-in';
      if(isHalf)      cls+=' halfway';
      if(isOver)      cls+=' over-budget';
      card.className=cls;

      card.innerHTML=`
        <div class="card-title-row">
          <div class="card-title">${job.title}</div>
          <span class="priority-pill ${pillClass(job.priority)}">${pillLabel(job.priority)}</span>
        </div>
        ${(job.bullets||[]).length?`<ul class="card-bullets">${job.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`:''}
        <div class="card-timer-section">
          <div class="timer-row">
            <div class="timer-display ${isRunning?'running':''}" id="timer-${job.id}">${isRunning?formatDur(Date.now()-activeTimers[job.id].start):formatDur(0)}</div>
            <div class="pulse-dot ${isRunning?'running':''}"></div>
          </div>
          <div class="timer-meta ${isRunning?'running':''}">${isRunning?'Clocked in at '+fmtTime(activeTimers[job.id].start):(lastEntry?'Last: '+fmtDateTime(lastEntry.start):'Not started')}</div>
          ${sessions>0?`<div style="margin-top:5px;color:#7b6ef6;font-size:11px;font-family:'DM Mono',monospace;">Total: ${durHours(logMs)}h · ${sessions} session${sessions===1?'':'s'}</div>`:''}
        </div>
        <div class="card-footer">
          ${job.estHours?`<div class="card-meta-row"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="opacity:.6;flex-shrink:0"><path d="M3 1v14M3 2h9l-2.5 4L12 10H3" stroke="#9494aa" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="meta-label">Est.:</span><span class="meta-val" style="${isOver?'color:#e87d5a':''}">${job.estHours}h${isOver?' ⚠ over':(!isOver&&totalMs>0?' ('+Math.round(totalMs/estMs*100)+'%)':'')}</span></div>`:''}
          <div class="card-actions">
            ${isRunning?`<button class="btn-punch-out" onclick="punchOut('${job.id}')">⬛ Clock Out</button>`:`<button class="btn-punch-in" onclick="punchIn('${job.id}')" ${!attRunning?'disabled style="opacity:0.35;cursor:not-allowed;"':''}>▶ Clock In</button>`}
            <button class="card-btn" onclick="openEditJob('${job.id}')">Edit</button>
            <button class="card-btn del" onclick="deleteJob('${job.id}')">Delete</button>
          </div>
        </div>`;
      colBody.appendChild(card);
    });
  });

  const addColBtn=document.createElement('button');
  addColBtn.className='add-col-btn'; addColBtn.innerHTML='+'; addColBtn.onclick=()=>openAddEmployee();
  board.appendChild(addColBtn);
}

// ── Live ticker ───────────────────────────────────────────────────────
setInterval(() => {
  Object.entries(activeTimers).forEach(([id,t])=>{
    const el=document.getElementById('timer-'+id);
    if(el) el.textContent=formatDur(Date.now()-t.start);
  });
  const ws=getWeekStart();
  employees.forEach(emp=>{
    const el=document.getElementById('att-timer-'+emp.id);
    if(el) {
      const attRunning=!!attendanceTimers[emp.id];
      el.textContent=formatDur(weeklyAttHoursForEmp(emp.id));
    }
  });
  renderStats();
  document.getElementById('liveClock').textContent = new Date().toLocaleTimeString();
},1000);

// ── Job modal ─────────────────────────────────────────────────────────
window.openAddJob = function(empId) { pendingEmpId=empId; currentEditJob=null; showJobModal(); };
window.openEditJob = function(jobId) { currentEditJob=jobs.find(j=>j.id===jobId); showJobModal(); };

function showJobModal() {
  const j=currentEditJob;
  const empOpts=employees.map(e=>`<option value="${e.id}" ${(j&&j.empId===e.id)||(pendingEmpId===e.id&&!j)?'selected':''}>${e.name}</option>`).join('');
  document.getElementById('modalContainer').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
      <h3>${j?'Edit job':'New job'}</h3>
      <div class="form-group">
        <label class="form-label">PROJECT</label>
        <div class="project-picker-box" id="projectPickerBox" onclick="openProjectPicker()">
          <span id="projectPickerLabel">${j&&j.title?j.title:'<span class="ppb-placeholder">Select a project…</span>'}</span>
          <span class="ppb-arrow">▾</span>
        </div>
        <input type="hidden" id="fTitle" value="${j?j.title:''}">
      </div>
      <div class="form-group"><label class="form-label">DESCRIPTION BULLETS</label><textarea class="form-textarea" id="fBullets" placeholder="One bullet per line...">${j?(j.bullets||[]).join('\n'):''}</textarea><div class="bullets-helper">Each line becomes a bullet</div></div>
      <div class="form-group"><label class="form-label">ASSIGNED TO</label><select class="form-select" id="fEmp">${empOpts}</select></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">PRIORITY</label><select class="form-select" id="fPriority"><option value="high" ${j&&j.priority==='high'?'selected':''}>Urgent</option><option value="medium" ${j&&j.priority==='medium'?'selected':''}>Normal</option><option value="low" ${j&&j.priority==='low'?'selected':''}>Low</option></select></div>
        <div class="form-group"><label class="form-label">EST. HOURS</label><input class="form-input" type="number" id="fEst" min="0.5" step="0.5" value="${j?j.estHours||'':''}" placeholder="e.g. 4"></div>
      </div>
      <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveJobModal()">Save job</button></div>
    </div></div>`;}

// ── Project picker ──────────────────────────────────────────────────
window.openProjectPicker = function() {
  const currentTitle = document.getElementById('fTitle').value;
  document.getElementById('modalContainer').insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="projectPickerOverlay" onclick="if(event.target===this)closeProjectPicker()" style="z-index:110;">
      <div class="modal">
        <h3>Select Project</h3>
        <div class="project-list" id="projectListBox">
          ${renderProjectListItems(currentTitle)}
        </div>
        <div class="form-group">
          <label class="form-label">ADD NEW PROJECT</label>
          <div class="add-project-row">
            <input class="form-input" id="newProjectName" placeholder="Project name…" onkeydown="if(event.key==='Enter')addNewProject()">
            <button class="btn btn-primary" onclick="addNewProject()">Add</button>
          </div>
        </div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeProjectPicker()">Close</button></div>
      </div>
    </div>
  `);
};

function renderProjectListItems(currentTitle) {
  if (!projects.length) return '<div class="project-empty">No projects yet — add one below.</div>';
  return projects.map(p => `<div class="project-item ${p.name===currentTitle?'selected':''}" onclick="selectProject('${p.id}')">${p.name}</div>`).join('');
}

window.selectProject = function(projectId) {
  const proj = projects.find(p => p.id === projectId);
  if (!proj) return;
  document.getElementById('fTitle').value = proj.name;
  document.getElementById('projectPickerLabel').textContent = proj.name;
  closeProjectPicker();
};

window.addNewProject = async function() {
  const input = document.getElementById('newProjectName');
  const name = input.value.trim();
  if (!name) return;
  const existing = projects.find(p => p.name.toLowerCase() === name.toLowerCase());
  if (existing) {
    selectProject(existing.id);
    return;
  }
  const id = 'p'+Date.now();
  await setDoc(doc(db,'projects',id), { name });
  document.getElementById('fTitle').value = name;
  document.getElementById('projectPickerLabel').textContent = name;
  input.value = '';
  closeProjectPicker();
};

window.closeProjectPicker = function() {
  const ov = document.getElementById('projectPickerOverlay');
  if (ov) ov.remove();
};

window.saveJobModal = async function() {
  const title=document.getElementById('fTitle').value.trim();
  if (!title) { alert('Please select a project.'); return; }
  const payload={ id:currentEditJob?currentEditJob.id:'j'+Date.now(), empId:document.getElementById('fEmp').value, title, bullets:document.getElementById('fBullets').value.split('\n').map(l=>l.trim()).filter(Boolean), priority:document.getElementById('fPriority').value, estHours:parseFloat(document.getElementById('fEst').value)||0 };
  await saveJob(payload);
  closeModal();
};

// ── Employee modal ────────────────────────────────────────────────────
window.openAddEmployee    = function() { currentEditEmployee=null; showEmployeeModal(); };
window.openEditEmployee   = function(empId) { currentEditEmployee=employees.find(e=>e.id===empId); showEmployeeModal(); };

function showEmployeeModal() {
  const e=currentEditEmployee;
  document.getElementById('modalContainer').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
      <h3>${e?'Edit employee':'Add employee'}</h3>
      <div class="form-group"><label class="form-label">NAME</label><input class="form-input" id="eName" value="${e?e.name:''}" placeholder="Full name"></div>
      <div class="form-group"><label class="form-label">ROLE / TITLE</label><input class="form-input" id="eRole" value="${e?e.role:''}" placeholder="e.g. Fabricator"></div>
      <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEmployeeModal()">${e?'Save changes':'Add employee'}</button></div>
    </div></div>`;}

window.saveEmployeeModal = async function() {
  const name=document.getElementById('eName').value.trim(), role=document.getElementById('eRole').value.trim(); if(!name)return;
  const id=currentEditEmployee?currentEditEmployee.id:'e'+Date.now();
  await saveEmployee({ id, name, role:role||'Team Member' });
  closeModal();
};

window.closeModal = function() { document.getElementById('modalContainer').innerHTML=''; };

document.getElementById('liveClock').textContent = new Date().toLocaleTimeString();
</script>
</html>
